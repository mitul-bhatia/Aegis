version: '3.8'

services:
  # PostgreSQL Database (Production-ready)
  postgres:
    image: postgres:15-alpine
    container_name: aegis-postgres
    environment:
      POSTGRES_DB: aegis
      POSTGRES_USER: aegis
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aegis_secure_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aegis"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache (Performance)
  redis:
    image: redis:7-alpine
    container_name: aegis-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # Aegis Backend
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: aegis-backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://aegis:${POSTGRES_PASSWORD:-aegis_secure_password}@postgres:5432/aegis
      - REDIS_URL=redis://redis:6379/0
      - MISTRAL_API_KEY=${MISTRAL_API_KEY}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - GITHUB_WEBHOOK_SECRET=${GITHUB_WEBHOOK_SECRET}
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET}
      - DEMO_MODE=${DEMO_MODE:-false}
      - AUTO_FALLBACK_TO_DEMO=${AUTO_FALLBACK_TO_DEMO:-true}
    ports:
      - "8000:8000"
    volumes:
      - ./repos:/app/repos
      - /var/run/docker.sock:/var/run/docker.sock  # For sandbox execution
    restart: unless-stopped

  # Aegis Frontend
  frontend:
    build:
      context: ./aegis-frontend
      dockerfile: Dockerfile
    container_name: aegis-frontend
    depends_on:
      - backend
    environment:
      - NEXT_PUBLIC_BACKEND_URL=http://localhost:8000
    ports:
      - "3000:3000"
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
