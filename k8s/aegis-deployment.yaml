# Aegis Production Deployment - Kubernetes Configuration
# Autonomous Security Operations Platform

apiVersion: v1
kind: Namespace
metadata:
  name: aegis
  labels:
    name: aegis
    app: aegis-security
---
# ConfigMap for environment variables
apiVersion: v1
kind: ConfigMap
metadata:
  name: aegis-config
  namespace: aegis
data:
  PORT: "8000"
  ENABLE_AUTONOMOUS_SCANNING: "true"
  SCAN_INTERVAL_HOURS: "24"
  LOG_LEVEL: "INFO"
  ENVIRONMENT: "production"
---
# Secret for sensitive data
apiVersion: v1
kind: Secret
metadata:
  name: aegis-secrets
  namespace: aegis
type: Opaque
data:
  # Base64 encoded values - replace with actual values
  MISTRAL_API_KEY: <base64-encoded-api-key>
  GITHUB_TOKEN: <base64-encoded-github-token>
  GITHUB_WEBHOOK_SECRET: <base64-encoded-webhook-secret>
  GITHUB_CLIENT_ID: <base64-encoded-client-id>
  GITHUB_CLIENT_SECRET: <base64-encoded-client-secret>
---
# Persistent Volume for database
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: aegis-data-pvc
  namespace: aegis
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: fast-ssd
---
# Persistent Volume for vector database
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: aegis-vector-pvc
  namespace: aegis
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
  storageClassName: fast-ssd
---
# Redis for caching and queues
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: aegis
  labels:
    app: redis
    component: cache
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
      component: cache
  template:
    metadata:
      labels:
        app: redis
        component: cache
    spec:
      containers:
      - name: redis
        image: redis:7-alpine
        ports:
        - containerPort: 6379
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "200m"
        livenessProbe:
          tcpSocket:
            port: 6379
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          tcpSocket:
            port: 6379
          initialDelaySeconds: 5
          periodSeconds: 5
---
# Redis Service
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: aegis
  labels:
    app: redis
    component: cache
spec:
  ports:
  - port: 6379
    targetPort: 6379
  selector:
    app: redis
    component: cache
---
# Elasticsearch for threat intelligence
apiVersion: apps/v1
kind: Deployment
metadata:
  name: elasticsearch
  namespace: aegis
  labels:
    app: elasticsearch
    component: search
spec:
  replicas: 1
  selector:
    matchLabels:
      app: elasticsearch
      component: search
  template:
    metadata:
      labels:
        app: elasticsearch
        component: search
    spec:
      containers:
      - name: elasticsearch
        image: docker.elastic.co/elasticsearch/elasticsearch:8.10.0
        ports:
        - containerPort: 9200
        - containerPort: 9300
        env:
        - name: discovery.type
          value: "single-node"
        - name: ES_JAVA_OPTS
          value: "-Xms512m -Xmx512m"
        - name: xpack.security.enabled
          value: "false"
        resources:
          requests:
            memory: "1Gi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "1000m"
        volumeMounts:
        - name: elasticsearch-data
          mountPath: /usr/share/elasticsearch/data
        livenessProbe:
          httpGet:
            path: /_cluster/health
            port: 9200
          initialDelaySeconds: 60
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /_cluster/health
            port: 9200
          initialDelaySeconds: 30
          periodSeconds: 10
      volumes:
      - name: elasticsearch-data
        persistentVolumeClaim:
          claimName: aegis-data-pvc
---
# Elasticsearch Service
apiVersion: v1
kind: Service
metadata:
  name: elasticsearch
  namespace: aegis
  labels:
    app: elasticsearch
    component: search
spec:
  ports:
  - port: 9200
    targetPort: 9200
    name: http
  - port: 9300
    targetPort: 9300
    name: transport
  selector:
    app: elasticsearch
    component: search
---
# Aegis API Gateway
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aegis-api-gateway
  namespace: aegis
  labels:
    app: aegis
    component: api-gateway
spec:
  replicas: 3
  selector:
    matchLabels:
      app: aegis
      component: api-gateway
  template:
    metadata:
      labels:
        app: aegis
        component: api-gateway
    spec:
      containers:
      - name: api-gateway
        image: aegis/api-gateway:latest
        ports:
        - containerPort: 8000
        env:
        - name: PORT
          valueFrom:
            configMapKeyRef:
              name: aegis-config
              key: PORT
        - name: REDIS_URL
          value: "redis://redis:6379"
        - name: ELASTICSEARCH_URL
          value: "http://elasticsearch:9200"
        envFrom:
        - configMapRef:
            name: aegis-config
        - secretRef:
            name: aegis-secrets
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
        volumeMounts:
        - name: aegis-data
          mountPath: /app/data
        - name: aegis-vector
          mountPath: /app/vector_db
      volumes:
      - name: aegis-data
        persistentVolumeClaim:
          claimName: aegis-data-pvc
      - name: aegis-vector
        persistentVolumeClaim:
          claimName: aegis-vector-pvc
---
# Aegis API Gateway Service
apiVersion: v1
kind: Service
metadata:
  name: aegis-api-gateway
  namespace: aegis
  labels:
    app: aegis
    component: api-gateway
spec:
  type: ClusterIP
  ports:
  - port: 8000
    targetPort: 8000
    name: http
  selector:
    app: aegis
    component: api-gateway
---
# Aegis Agent Service
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aegis-agents
  namespace: aegis
  labels:
    app: aegis
    component: agents
spec:
  replicas: 5
  selector:
    matchLabels:
      app: aegis
      component: agents
  template:
    metadata:
      labels:
        app: aegis
        component: agents
    spec:
      containers:
      - name: agent-service
        image: aegis/agents:latest
        env:
        - name: REDIS_URL
          value: "redis://redis:6379"
        - name: ELASTICSEARCH_URL
          value: "http://elasticsearch:9200"
        envFrom:
        - configMapRef:
            name: aegis-config
        - secretRef:
            name: aegis-secrets
        resources:
          requests:
            memory: "1Gi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8001
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8001
          initialDelaySeconds: 5
          periodSeconds: 5
---
# Aegis Agent Service
apiVersion: v1
kind: Service
metadata:
  name: aegis-agents
  namespace: aegis
  labels:
    app: aegis
    component: agents
spec:
  type: ClusterIP
  ports:
  - port: 8001
    targetPort: 8001
    name: http
  selector:
    app: aegis
    component: agents
---
# Aegis Intelligence Service
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aegis-intelligence
  namespace: aegis
  labels:
    app: aegis
    component: intelligence
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aegis
      component: intelligence
  template:
    metadata:
      labels:
        app: aegis
        component: intelligence
    spec:
      containers:
      - name: intelligence-service
        image: aegis/intelligence:latest
        env:
        - name: REDIS_URL
          value: "redis://redis:6379"
        - name: ELASTICSEARCH_URL
          value: "http://elasticsearch:9200"
        envFrom:
        - configMapRef:
            name: aegis-config
        - secretRef:
            name: aegis-secrets
        resources:
          requests:
            memory: "2Gi"
            cpu: "1000m"
          limits:
            memory: "4Gi"
            cpu: "2000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8002
          initialDelaySeconds: 60
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /health
            port: 8002
          initialDelaySeconds: 30
          periodSeconds: 10
---
# Aegis Intelligence Service
apiVersion: v1
kind: Service
metadata:
  name: aegis-intelligence
  namespace: aegis
  labels:
    app: aegis
    component: intelligence
spec:
  type: ClusterIP
  ports:
  - port: 8002
    targetPort: 8002
    name: http
  selector:
    app: aegis
    component: intelligence
---
# Aegis Frontend
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aegis-frontend
  namespace: aegis
  labels:
    app: aegis
    component: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aegis
      component: frontend
  template:
    metadata:
      labels:
        app: aegis
        component: frontend
    spec:
      containers:
      - name: frontend
        image: aegis/frontend:latest
        ports:
        - containerPort: 3000
        env:
        - name: NEXT_PUBLIC_API_URL
          value: "http://aegis-api-gateway:8000"
        - name: NEXT_PUBLIC_ENVIRONMENT
          value: "production"
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 5
---
# Aegis Frontend Service
apiVersion: v1
kind: Service
metadata:
  name: aegis-frontend
  namespace: aegis
  labels:
    app: aegis
    component: frontend
spec:
  type: ClusterIP
  ports:
  - port: 3000
    targetPort: 3000
    name: http
  selector:
    app: aegis
    component: frontend
---
# Ingress for external access
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: aegis-ingress
  namespace: aegis
  annotations:
    kubernetes.io/ingress.class: "nginx"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
spec:
  tls:
  - hosts:
    - aegis.yourdomain.com
    secretName: aegis-tls
  rules:
  - host: aegis.yourdomain.com
    http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: aegis-api-gateway
            port:
              number: 8000
      - path: /
        pathType: Prefix
        backend:
          service:
            name: aegis-frontend
            port:
              number: 3000
---
# Horizontal Pod Autoscaler for API Gateway
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: aegis-api-gateway-hpa
  namespace: aegis
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: aegis-api-gateway
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
---
# Horizontal Pod Autoscaler for Agents
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: aegis-agents-hpa
  namespace: aegis
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: aegis-agents
  minReplicas: 5
  maxReplicas: 20
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 80
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 85
---
# Horizontal Pod Autoscaler for Intelligence
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: aegis-intelligence-hpa
  namespace: aegis
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: aegis-intelligence
  minReplicas: 2
  maxReplicas: 8
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 75
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
---
# Network Policy for security
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: aegis-network-policy
  namespace: aegis
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: ingress-nginx
    ports:
    - protocol: TCP
      port: 8000
    - protocol: TCP
      port: 3000
  egress:
  - to: []
    ports:
    - protocol: TCP
      port: 53
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 443
    - protocol: TCP
      port: 80
---
# Resource Quota
apiVersion: v1
kind: ResourceQuota
metadata:
  name: aegis-quota
  namespace: aegis
spec:
  hard:
    requests.cpu: "10"
    requests.memory: 20Gi
    limits.cpu: "20"
    limits.memory: 40Gi
    persistentvolumeclaims: "5"
    services: "10"
    secrets: "10"
    configmaps: "10"
